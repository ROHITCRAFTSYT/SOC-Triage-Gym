<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#111826"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2436"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="920" height="380" fill="url(#bg)"/>
  <text x="460" y="34" fill="#e6edf3" font-size="20" font-weight="700" text-anchor="middle">SOC-Triage-Gym — an alert flows through the 3-tier team</text>
  <text x="460" y="56" fill="#8b949e" font-size="12.5" text-anchor="middle">step_reward = 0.6 × role_reward + 0.4 × Δteam_F1</text>

  <!-- connecting rail -->
  <line x1="150" y1="180" x2="770" y2="180" stroke="#30363d" stroke-width="3"/>
  <line x1="150" y1="180" x2="770" y2="180" stroke="#58a6ff" stroke-width="3" stroke-dasharray="10 14" opacity="0.7">
    <animate attributeName="stroke-dashoffset" from="0" to="-48" dur="1.2s" repeatCount="indefinite"/>
  </line>

  <!-- SIEM source -->
  <g>
    <rect x="40" y="140" width="110" height="80" rx="12" fill="url(#node)" stroke="#30363d"/>
    <text x="95" y="170" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">SIEM</text>
    <text x="95" y="192" fill="#8b949e" font-size="10.5" text-anchor="middle">alert queue</text>
    <circle cx="95" cy="208" r="4" fill="#f85149">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Tier-1 -->
  <g>
    <rect x="230" y="130" width="140" height="100" rx="12" fill="url(#node)" stroke="#58a6ff"/>
    <text x="300" y="160" fill="#58a6ff" font-size="14" font-weight="700" text-anchor="middle">Tier-1</text>
    <text x="300" y="182" fill="#c9d1d9" font-size="10.5" text-anchor="middle">enrich · correlate</text>
    <text x="300" y="198" fill="#c9d1d9" font-size="10.5" text-anchor="middle">classify · escalate</text>
    <circle cx="300" cy="130" r="6" fill="#58a6ff" filter="url(#glow)">
      <animate attributeName="r" values="6;9;6" dur="2s" begin="0s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Tier-2 -->
  <g>
    <rect x="460" y="130" width="140" height="100" rx="12" fill="url(#node)" stroke="#f778ba"/>
    <text x="530" y="160" fill="#f778ba" font-size="14" font-weight="700" text-anchor="middle">Tier-2</text>
    <text x="530" y="182" fill="#c9d1d9" font-size="10.5" text-anchor="middle">detonate · isolate</text>
    <text x="530" y="198" fill="#c9d1d9" font-size="10.5" text-anchor="middle">block · close</text>
    <circle cx="530" cy="130" r="6" fill="#f778ba" filter="url(#glow)">
      <animate attributeName="r" values="6;9;6" dur="2s" begin="0.66s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Manager -->
  <g>
    <rect x="690" y="130" width="140" height="100" rx="12" fill="url(#node)" stroke="#3fb950"/>
    <text x="760" y="160" fill="#3fb950" font-size="14" font-weight="700" text-anchor="middle">Manager</text>
    <text x="760" y="182" fill="#c9d1d9" font-size="10.5" text-anchor="middle">audit · override</text>
    <text x="760" y="198" fill="#c9d1d9" font-size="10.5" text-anchor="middle">flag · explain</text>
    <circle cx="760" cy="130" r="6" fill="#3fb950" filter="url(#glow)">
      <animate attributeName="r" values="6;9;6" dur="2s" begin="1.32s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- travelling ticket -->
  <g filter="url(#glow)">
    <rect x="-14" y="-10" width="28" height="20" rx="5" fill="#ffd33d" stroke="#0d1117" stroke-width="1.5">
      <animateMotion path="M 95 250 L 300 250 L 530 250 L 760 250" dur="6s" repeatCount="indefinite" rotate="0"/>
    </rect>
    <text x="0" y="4" fill="#0d1117" font-size="9" font-weight="700" text-anchor="middle">🎫
      <animateMotion path="M 95 250 L 300 250 L 530 250 L 760 250" dur="6s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- reward meter -->
  <text x="40" y="322" fill="#8b949e" font-size="11">team F1 reward</text>
  <rect x="150" y="312" width="680" height="14" rx="7" fill="#161b22" stroke="#30363d"/>
  <rect x="150" y="312" width="0" height="14" rx="7" fill="#3fb950">
    <animate attributeName="width" values="0;140;140;420;420;680;680;0" keyTimes="0;0.17;0.33;0.5;0.66;0.83;0.97;1" dur="6s" repeatCount="indefinite"/>
  </rect>
  <text x="845" y="322" fill="#3fb950" font-size="11" font-weight="700">↑</text>
</svg>
